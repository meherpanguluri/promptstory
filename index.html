<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>promptstory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Cascadia Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .prompt-mono { font-family: 'JetBrains Mono', monospace; }

    /* Modal animation */
    #modal { transition: opacity 0.15s ease; }
    #modal.hidden { opacity: 0; pointer-events: none; }
    #modal-panel {
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    #modal.hidden #modal-panel {
      transform: translateY(8px);
      opacity: 0;
    }

    /* Card hover */
    .prompt-card {
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .prompt-card:hover {
      box-shadow: 0 0 0 1px #000;
    }

    /* Filter pill active */
    .filter-pill.active {
      background: #000;
      color: #fff;
    }

    /* Copy button feedback */
    .copy-btn.copied {
      background: #000;
      color: #fff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 2px; }
  </style>
</head>
<body class="bg-white text-black min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-100 px-6 py-5">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div>
        <span class="text-lg font-semibold tracking-tight">promptstory</span>
        <span class="ml-2 text-xs text-gray-400 font-mono">prompts that actually work</span>
      </div>
      <a
        href="https://github.com/meherpanguluri/promptstory"
        target="_blank"
        rel="noopener noreferrer"
        class="text-xs text-gray-400 hover:text-black transition-colors flex items-center gap-1.5"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <!-- Hero -->
  <section class="px-6 pt-16 pb-12 text-center">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-4xl font-semibold tracking-tight leading-tight mb-3">
        Prompts that change how<br />you work with AI.
      </h1>
      <p class="text-gray-500 text-base leading-relaxed">
        A curated collection of high-leverage prompts. Copy, use, adapt.
      </p>
    </div>
  </section>

  <!-- Search bar -->
  <div class="px-6 pb-6">
    <div class="max-w-xl mx-auto relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search-input"
        type="search"
        placeholder="Search prompts…"
        autocomplete="off"
        class="w-full pl-9 pr-4 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-black transition-colors bg-white placeholder-gray-400"
      />
    </div>
  </div>

  <!-- Filter bar -->
  <div class="px-6 pb-10">
    <div class="max-w-5xl mx-auto">
      <div id="filter-bar" class="flex flex-wrap justify-center gap-2">
        <button
          data-category="all"
          class="filter-pill active text-xs font-medium px-3 py-1.5 rounded-full border border-gray-200 hover:border-black transition-colors cursor-pointer"
        >All</button>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <main class="px-6 pb-24">
    <div class="max-w-5xl mx-auto">
      <div id="prompt-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Cards injected by JS -->
      </div>
      <p id="empty-state" class="hidden text-center text-gray-400 text-sm py-16">No prompts match your search.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 px-6 py-6 text-center">
    <p class="text-xs text-gray-400">
      promptstory &mdash; open source prompt library &mdash;
      <a href="https://github.com/meherpanguluri/promptstory" class="hover:text-black transition-colors">contribute on GitHub</a>
    </p>
  </footer>

  <!-- Modal -->
  <div
    id="modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);"
    role="dialog"
    aria-modal="true"
  >
    <div
      id="modal-panel"
      class="bg-white w-full max-w-xl rounded-xl border border-gray-200 shadow-2xl max-h-[90vh] overflow-y-auto"
    >
      <!-- Modal header -->
      <div class="flex items-start justify-between p-6 border-b border-gray-100">
        <div>
          <div id="modal-category" class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-1"></div>
          <h2 id="modal-title" class="text-xl font-semibold tracking-tight"></h2>
        </div>
        <button
          id="modal-close"
          class="ml-4 mt-0.5 text-gray-400 hover:text-black transition-colors flex-shrink-0"
          aria-label="Close"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Prompt text -->
      <div class="p-6 border-b border-gray-100">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Prompt</div>
        <p id="modal-prompt" class="prompt-mono text-sm leading-relaxed text-black bg-gray-50 rounded-lg p-4 border border-gray-100 whitespace-pre-wrap"></p>
        <button
          id="copy-btn"
          class="copy-btn mt-3 w-full text-xs font-medium py-2 px-4 rounded-lg border border-gray-200 hover:border-black transition-all flex items-center justify-center gap-2"
        >
          <svg id="copy-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copy-label">Copy prompt</span>
        </button>
      </div>

      <!-- Why it works -->
      <div class="p-6 border-b border-gray-100">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">Why it works</div>
        <p id="modal-why" class="text-sm text-gray-600 leading-relaxed"></p>
      </div>

      <!-- Usage notes -->
      <div class="p-6">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-2">Usage notes</div>
        <p id="modal-usage" class="text-sm text-gray-600 leading-relaxed"></p>
      </div>
    </div>
  </div>

  <script>
    const CATEGORIES = ['Project Kickoff', 'Debugging', 'Writing', 'Research', 'Code Review', 'Thinking'];
    let allPrompts = [];
    let activeCategory = 'all';
    let searchQuery = '';

    // ── Fetch data ──────────────────────────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('prompts.json');
        allPrompts = await res.json();
      } catch (e) {
        // Fallback for local file:// — shouldn't happen on Pages
        allPrompts = [];
      }
      buildFilterBar();
      initSearch();
      renderCards(allPrompts);
    }

    // ── Filter bar ──────────────────────────────────────────────────────────────
    function buildFilterBar() {
      const bar = document.getElementById('filter-bar');
      // Get categories present in data, preserving defined order
      const present = CATEGORIES.filter(c => allPrompts.some(p => p.category === c));
      present.forEach(cat => {
        const btn = document.createElement('button');
        btn.dataset.category = cat;
        btn.className = 'filter-pill text-xs font-medium px-3 py-1.5 rounded-full border border-gray-200 hover:border-black transition-colors cursor-pointer';
        btn.textContent = cat;
        bar.appendChild(btn);
      });
      bar.addEventListener('click', e => {
        const btn = e.target.closest('.filter-pill');
        if (!btn) return;
        activeCategory = btn.dataset.category;
        bar.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
    }

    // ── Search ──────────────────────────────────────────────────────────────────
    function initSearch() {
      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value.trim().toLowerCase();
        applyFilters();
      });
    }

    function applyFilters() {
      let results = activeCategory === 'all' ? allPrompts : allPrompts.filter(p => p.category === activeCategory);
      if (searchQuery) {
        results = results.filter(p =>
          p.title.toLowerCase().includes(searchQuery) ||
          p.prompt.toLowerCase().includes(searchQuery) ||
          p.why_it_works.toLowerCase().includes(searchQuery) ||
          p.usage_notes.toLowerCase().includes(searchQuery) ||
          p.category.toLowerCase().includes(searchQuery) ||
          p.tags.some(t => t.toLowerCase().includes(searchQuery))
        );
      }
      renderCards(results);
    }

    // ── Cards ───────────────────────────────────────────────────────────────────
    function renderCards(prompts) {
      const grid = document.getElementById('prompt-grid');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';
      if (!prompts.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      prompts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'prompt-card bg-white border border-gray-200 rounded-xl p-5 cursor-pointer flex flex-col gap-3';
        card.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="text-xs font-medium text-gray-400 uppercase tracking-widest">${escHtml(p.category)}</span>
          </div>
          <div>
            <h3 class="font-semibold text-base tracking-tight leading-snug mb-1">${escHtml(p.title)}</h3>
            <p class="text-xs text-gray-500 leading-relaxed line-clamp-2">${escHtml(p.why_it_works)}</p>
          </div>
          <div class="mt-auto pt-2 border-t border-gray-100 flex items-center gap-1.5">
            ${p.tags.slice(0,2).map(t => `<span class="text-xs text-gray-400 bg-gray-50 border border-gray-100 px-2 py-0.5 rounded-full">${escHtml(t)}</span>`).join('')}
            <span class="ml-auto text-xs text-gray-300">→</span>
          </div>
        `;
        card.addEventListener('click', () => openModal(p));
        grid.appendChild(card);
      });
    }

    // ── Modal ───────────────────────────────────────────────────────────────────
    function openModal(p) {
      document.getElementById('modal-category').textContent = p.category;
      document.getElementById('modal-title').textContent = p.title;
      document.getElementById('modal-prompt').textContent = p.prompt;
      document.getElementById('modal-why').textContent = p.why_it_works;
      document.getElementById('modal-usage').textContent = p.usage_notes;
      resetCopyBtn();
      const modal = document.getElementById('modal');
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Copy ────────────────────────────────────────────────────────────────────
    document.getElementById('copy-btn').addEventListener('click', async () => {
      const text = document.getElementById('modal-prompt').textContent;
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copy-btn');
        const label = document.getElementById('copy-label');
        const icon = document.getElementById('copy-icon');
        btn.classList.add('copied');
        label.textContent = 'Copied!';
        icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        setTimeout(resetCopyBtn, 2000);
      } catch {}
    });

    function resetCopyBtn() {
      const btn = document.getElementById('copy-btn');
      const label = document.getElementById('copy-label');
      const icon = document.getElementById('copy-icon');
      btn.classList.remove('copied');
      label.textContent = 'Copy prompt';
      icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
    }

    // ── Util ────────────────────────────────────────────────────────────────────
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
